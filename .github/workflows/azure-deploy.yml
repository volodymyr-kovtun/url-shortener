# Reference workflow for deploying to Azure App Service.
# Disabled by default — only runs when triggered manually from the Actions tab.
# To use:
#   1. Provision an Azure App Service (Linux, .NET 10) and download its publish profile.
#   2. Add the contents as a repository secret named AZURE_PUBLISH_PROFILE.
#   3. Replace REPLACE_WITH_YOUR_APP_NAME below with the App Service name.
#   4. Run via "Actions" → "Deploy to Azure App Service" → "Run workflow".

name: Deploy to Azure App Service

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src/UrlShortener.sln --configuration Release

      - name: Publish
        run: dotnet publish src/UrlShortener.Host/UrlShortener.Host.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: REPLACE_WITH_YOUR_APP_NAME
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .
