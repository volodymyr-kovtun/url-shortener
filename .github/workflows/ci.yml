name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/UrlShortener.sln

      - name: Build
        run: dotnet build src/UrlShortener.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/UrlShortener.sln --no-build --configuration Release --verbosity normal

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/UrlShortener.Host/Dockerfile
          push: false
          tags: urlshortener:ci
