services:
  api:
    build:
      context: ../src
      dockerfile: UrlShortener.Host/Dockerfile
    container_name: urlshortener-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Storage__Provider: Sqlite
      Storage__Sqlite__ConnectionString: "Data Source=/data/urlshortener.db"
      Auth__ApiKey: ${API_KEY:?API_KEY must be set in docker/.env}
      Shortener__Domain: "http://localhost:8080"
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
